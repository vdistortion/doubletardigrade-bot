name: doubletardigrade-bot-dev

services:
  db:
    image: postgres:16-alpine
    restart: always
    env_file: .env.dev
    ports:
      - '5432:5432'
    volumes:
      - db_dev:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  db_dev:
